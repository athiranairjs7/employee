<!DOCTYPE html>
<html>
<style>
body {font-family: Arial, Helvetica, sans-serif;
background-color: #474e5d;}
* {box-sizing: border-box;}

/* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 15px;
  margin: 5px 0 22px 0;
  display: inline-block;
  border: none;
  background: #f1f1f1;
}

/* Add a background color when the inputs get focus */
input[type=text]:focus, input[type=password]:focus {
  background-color: #ddd;
  outline: none;
}

/* Set a style for all buttons */
button {
  background-color: #4CAF50;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
  opacity: 0.9;
}

button:hover {
  opacity:1;
}
 .signupbtn {
  float: left;
  width: 100%;
}

/* Add padding to container elements */
.container {
  padding: 16px;
}

/* Modal Content/Box */
.modal-content {
  background-color: #fefefe;
  margin: 5% auto 15% auto; /* 5% from the top, 15% from the bottom and centered */
  border: 1px solid #888;
  width: 80%; /* Could be more or less, depending on screen size */
}

/* Style the horizontal ruler */
hr {
  border: 1px solid #f1f1f1;
  margin-bottom: 25px;
}

.close:hover,
.close:focus {
  color: #f44336;
  cursor: pointer;
}

/* Clear floats */
.clearfix::after {
  content: "";
  clear: both;
  display: table;
}
</style>
<body>
  <!-- GET_DATA is a variable in add_edit function -->
    <form method="POST" class="modal-content"action="{% url 'edit' get_data.id %}">  
        {% csrf_token %}
    <div class="container">
      <h1>Update Employee Details</h1>
      <p>Please fill in this form to create an account.</p>
      <hr>
      <label for="name"><b>Name of the Employee</b></label>
      <input type="text" placeholder="Name of the Employee" name="name" required value="{{get_data.name}}">  

      <label for="penno"><b>Pen Number</b></label>
      <input type="text" placeholder="Pen Number" name="penno" required value="{{get_data.penno}}">

      <label for="contact"><b>Contact Number</b></label>
      <input type="text" placeholder="Contact Number" name="contact" required value="{{get_data.contact}}">
      
      <p>By creating an account you agree to our <a href="#" style="color:dodgerblue">Terms & Privacy</a>.</p>

      <div class="clearfix">
        <button type="submit" class="signupbtn">Submit</button>
      </div>
    </div>
  </form>
</body>
</html>
