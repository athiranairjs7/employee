<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Employee Records</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/745e131cff.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <br>
        <h1 class="text-center">EMPLOYEE RECORDS</h1><br>
        <table class="table table-striped table-bordered table-sm">
            <thead class="table-success">
            <tr>
                <th>Employee ID</th>
                <th>Employee Name</th>
                <th>Employee PenNumber</th>
                <th>Contact Number</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
                <!-- content is a variable in display function -->
                {% for employee in content %}
                <tr>
                    <td>{{employee.id}}</td>
                    <td>{{employee.name}}</td>
                    <td>{{employee.penno}}</td>
                    <td>{{employee.contact}}</td>   
                    <td>  
                    &nbsp;&nbsp;&nbsp;&nbsp;<a href="/unilec/edit/{{ employee.id }}" title="EDIT"><i class="fa fa-pencil" aria-hidden="true"></i></span></a>&nbsp;&nbsp;&nbsp;&nbsp;
                    <a href="/unilec/delete/{{ employee.id }}" title="DELETE"><i class="fa fa-trash-o text-danger" aria-hidden="true" ></i>
                    </a>  
                    </td>  
               </tr>  
              {% endfor %}  
                  
            </tbody>
        </table>
    </div>
</body>
</html>
